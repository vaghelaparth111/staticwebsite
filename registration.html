<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .registration{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 950px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .left {
            width: 45%;
            background: linear-gradient(135deg, #6c63ff, #5548e8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 18px;
            line-height: 30px;
        }

        .right {
            width: 55%;
            padding: 40px;
        }

        .right h2 {
            font-size: 35px;
            margin-bottom: 10px;
            color: #333;
        }

        .right p {
            color: gray;
            margin-bottom: 30px;
        }

        form {
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-box {
            width: 100%;
        }

        .input-box input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #6c63ff;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .register-btn:hover {
            background: #5548e8;
        }

        .terms {
            margin-top: 15px;
            font-size: 14px;
            color: gray;
        }

        .terms input {
            margin-right: 5px;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
        }

        .login-link a {
            text-decoration: none;
            color: #6c63ff;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div id="header"></div>
    <div class="registration">
        <div class="container">
            <div class="left">
                <h1>ShopVerse</h1>
                <p>
                    Join ShopVerse and explore
                    premium products, trendy fashion,
                    and smart gadgets with amazing offers.
                </p>
            </div>
            <div class="right">
                <h2>Create Account 🚀</h2>
                <p>Register to start your shopping journey</p>
                <form>
                    <div class="input-group">
                        <div class="input-box">
                            <input type="text" placeholder="First Name" required>
                        </div>
                        <div class="input-box">
                            <input type="text" placeholder="Last Name" required>
                        </div>
                    </div>
                    <div class="input-box" style="margin-bottom:20px;">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-box" style="margin-bottom:20px;">
                        <input type="tel" placeholder="Phone Number" required>
                    </div>
                    <div class="input-group">
                        <div class="input-box">
                            <input type="password" placeholder="Password" required>
                        </div>
                        <div class="input-box">
                            <input type="password" placeholder="Confirm Password" required>
                        </div>
                    </div>
                    <div class="terms">
                        <label>
                            <input type="checkbox" required>
                            I agree to the Terms & Conditions
                        </label>
                    </div>
                    <button class="register-btn">Create Account</button>
                </form>
                <div class="login-link">
                    <p>Already have an account? <a href="#">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
