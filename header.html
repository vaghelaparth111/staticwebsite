<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f5f5f5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: white;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
        }

        .logo span {
            color: blue;
        }

        .navigation {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar ul {
            list-style: none;
            display: flex;
        }

        .navbar ul li {
            position: relative;
        }

        .navbar ul li a {
            text-decoration: none;
            color: black;
            padding: 10px 15px;
            display: block;
            line-height: 1.5;
        }

        .navbar ul li a:hover {
            color: blue;
            line-height: 1;
        }

        .navbar .dropdown {
            display: none;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgb(255, 255, 255);
            min-width: 180px;
            border-radius: 5px;
            overflow: hidden;
            z-index: 100;
        }

        .dropdown li {
            width: 100%;
        }

        .dropdown li a {
            padding: 12px 15px;
            color: black;
        }

        .dropdown li a:hover {
            background: white;
            text-decoration: none;
        }

        .navbar ul li:hover .dropdown {
            display: block;
            box-shadow: 0px 0px 5px rgb(105, 105, 105);
        }

        .searchbar {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 20px;
            width: 250px;
            height:40px;
        }
        .searchbar input {
            border: none;
            border-radius: 5px;
            width: 80%;
            font-size: 16px;
        }

        .searchbar input:focus {
            outline: none;
        }
        .searchbar i{
            color: black;
            font-size: 16px;
        }
        .searchbar button {
            border: none;
            padding: 5px 10px 0 5px;
            border-radius: 5px;
            color: white;
            background-color: white;
            cursor: pointer;
        }

        .cart a {
            text-decoration: none;
            color: black;
            padding: 10px;
        }

        .profile {
            position: relative;
        }
        .profile i, .cart i {
            color: blue;
            font-size: 25px;
        }

        .profile a {
            text-decoration: none;
            color: black;
            padding: 10px 15px;
            display: block;
        }

        .profile a:hover {
            color: blue;
        }

        .profile:hover .dropdown {
            box-shadow: 0px 0px 5px rgb(105, 105, 105);
            display: block;
            right: 0;
            left: auto;
        }

    </style>

</head>
<body>
    <header>
        <h2 class="logo">
            <i class="bx bx-shopping-bag"></i>Shop<span>Verse</span>
        </h2>
        <div class="navigation">
            <div class="navbar">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li>
                        <a href="#">Category</a>
                        <ul class="dropdown">
                            <li><a href="#">Electronics</a></li>
                            <li><a href="#">Fashion</a></li>
                            <li><a href="#">Shoes</a></li>
                            <li><a href="#">Accessories</a></li>
                            <li><a href="#">Bags</a></li>
                            <li><a href="#">Beauty</a></li>
                        </ul>
                    </li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>
            <div class="searchbar">
                <button><i class="bx bx-search"></i></button>
                <input type="text" placeholder="Search products...">
            </div>
            <div class="cart">
                <a href="#"><i class="bx bx-cart-alt"></i></a>
            </div>
            <div class="profile">
                <a href="#"><i class="bx bx-user-circle"></i></a>
                <ul class="dropdown">
                    <li><a href="login.html">Login</a></li>
                    <li><a href="registration.html">Register</a></li><hr>
                    <li><a href="#">My Profile</a></li>
                    <li><a href="#">Orders</a></li>
                    <li><a href="#">Payments</a></li><hr>
                    <li><a href="#">Logout</a></li>
                </ul>
            </div>
        </div>
    </header>
</body>
</html>
