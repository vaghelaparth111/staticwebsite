<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

    <style>
        body {
            background: #f5f5f5;
        }

        .contact-section {
            width: 100%;
            min-height: 100vh;
            padding: 2% 5% 5% 5%;
            background: white;
        }

        .contact-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-title h1 {
            font-size: 50px;
            color: #111827;
            margin-bottom: 15px;
        }

        .contact-title span {
            color: blue;
        }

        .contact-title p {
            color: #6b7280;
            font-size: 18px;
        }

        .contact-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .contact-form {
            flex: 1;
            min-width: 320px;
            background: #f9fafb;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0px 20px rgba(87, 87, 87, 0.16);
        }

        .contact-form h2 {
            margin-bottom: 25px;
            color: #111827;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input, .input-box textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box input:focus, .input-box textarea:focus {
            border-color: blue;
        }

        .input-box textarea {
            height: 150px;
            resize: none;
        }

        .send-message {
            width: 100%;
            padding: 15px;
            border: none;
            background: rgb(75, 75, 255);
            color: white;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-message:hover {
            background: blue;
        }

        .contact-map {
            flex: 1;
            min-width: 320px;
        }

        .contact-map iframe {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }
    </style>

</head>
<body>

    <div id="header"></div>

    <section class="contact-section">
        <div class="contact-title">
            <h1>Contact<span>Us</span></h1>
        </div>
        <div class="contact-container">
            <div class="contact-form">
                <h2>Send Message</h2>
                <form>
                    <div class="input-box">
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="input-box">
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="input-box">
                        <input type="text" placeholder="Subject" required>
                    </div>
                    <div class="input-box">
                        <textarea placeholder="Write Your Message"></textarea>
                    </div>
                    <button class="send-message">Send Message</button>
                </form>
            </div>

            <div class="contact-map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d117693.19670605272!2d72.5713628!3d23.022505!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f95f6f8f11%3A0x7e0c3b2e0d0c5b0d!2sAhmedabad%2C%20Gujarat!5e0!3m2!1sen!2sin!4v1715600000000!5m2!1sen!2sin"
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <div id="footer"></div>

</body>
</html>
