<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
    <style>

        .login{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .login-container {
            width: 900px;
            height: 500px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .left {
            width: 50%;
            background: linear-gradient(135deg, #6c63ff, #5a54d1);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .left h1 {
            font-size: 42px;
            margin-bottom: 20px;
        }

        .left p {
            font-size: 18px;
            line-height: 28px;
        }

        .right {
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right h2 {
            font-size: 35px;
            margin-bottom: 10px;
            color: #333;
        }

        .right p {
            color: gray;
            margin-bottom: 30px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #6c63ff;
        }

        .forgot {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot a {
            text-decoration: none;
            color: #6c63ff;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #5548e8;
        }

        .register {
            text-align: center;
            margin-top: 25px;
        }

        .register a {
            text-decoration: none;
            color: #6c63ff;
            font-weight: bold;
        }
    </style>

</head>

<body>
    <div id="header"></div>
<div class="login">
    <div class="login-container">
        <div class="left">
            <h1>ShopVerse</h1>
            <p>
                Discover trendy fashion, smart gadgets,
                and premium products with the best
                shopping experience.
            </p>
        </div>
        <div class="right">
            <h2>Welcome</h2>
            <p>Login to continue shopping</p>
            <div class="input-box">
                <input type="email" placeholder="Email Address">
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>
            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>
            <button class="login-btn">Login</button>
            <div class="register">
                <p>Don't have an account? <a href="registration.html">Register</a>
            </div>
        </div>
    </div>
</div>

<div id="footer"></div>
</body>

</html>
