<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>

    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>

    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .products {
            padding: 20px 250px;
        }

        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-content {
            padding: 25px;
        }

        .product-content h3 {
            margin-bottom: 10px;

            color: #111827;
        }

        .price {
            font-size: 20px;
            margin-bottom: 15px;
        }

        .add {
            width: 100%;
            padding: 12px;
            border: none;
            background: rgb(49, 49, 255);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add:hover {
            background: blue;
        }
    </style>

</head>

<body>
    <div id="header"></div>

    <div class="products">

        <div class="product-container" id="productContainer">
            <!-- Products will be injected here -->
        </div>
    </div>

    <div id="footer"></div>

    <script>
        // Sample product data
        let products = [
            {
                name: "smart watch ",
                price: 1500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749059975/qjnmnowwefmqllpqxkvj.jpg"
            },
            {
                name: "Mans t-shirt ",
                price: 2500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749058587/vgt63ew54utyj9mwzyin.webp"
            },
            {
                name: "Leptop Bag",
                price: 1200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749226373/gk6dkzcnl84baje33hq3.jpg"
            },
        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let container = document.getElementById("productContainer");

        function displayProducts() {
            container.innerHTML = "";
            products.forEach((product, index) => {
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${product.image}">
                        <div class="product-content">
                            <h3>${product.name}</h3>
                            <div class="price">$${product.price}</div>
                            <button class="add" onclick="addToCart(${index})">Add to Cart</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(index) {
            let product = products[index];
            let existing = cart.find(item => item.name === product.name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${product.name} added to cart!`);
        }

        displayProducts();
    </script>

</body>

</html>
