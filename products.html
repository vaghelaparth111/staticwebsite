<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
<script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f5f5f5;
        }

        .featured {
            padding: 20px;
        }

        .featured h2{
            margin: 20px;
            padding: 7px;
            border-left :10px solid blue;
        }

        .products {
            display: flex;
            gap: 50px;
            flex-wrap: wrap;
            padding: 0px 275px;
        }

        .product-item {
            width: 220px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 5px gray;
        }

        .product-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .add-cart {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-cart:hover {
            background: darkblue;
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <section class="featured">

        <h2>Fashion</h2>

        <div class="products">

            <div class="product-item">
                <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749317394/qspwwat75xd9kdzthjst.jpg">

                <h3>Blury T-Shirt</h3>

                <p>$59.99</p>

                <button onclick="addToCart('Blury T-Shirt', 59.99)" class="add-cart">
                    Add To Cart
                </button>
            </div>

            <div class="product-item">
                <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749316771/hpyj5fppm4lhgtylzm04.webp">

                <h3>Bandhani Saree</h3>

                <p>$79.99</p>

                <button onclick="addToCart('Bandhani Saree', 79.99)" class="add-cart">
                    Add To Cart
                </button>
            </div>

            <div class="product-item">
                <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749228085/x8zzx5ouglznx7dztfrj.webp">

                <h3>Ladies Bag</h3>

                <p>$35.99</p>

                <button onclick="addToCart('Ladies Bag', 35.99)" class="add-cart">
                    Add To Cart
                </button>
            </div>

        </div>
    </section>

    <script>

        function addToCart(name, price) {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push({
                name: name,
                price: price
            });

            localStorage.setItem("cart", JSON.stringify(cart));

            alert("Product Added To Cart");
        }

    </script>
    <div id="footer"></div>
</body>

</html>
