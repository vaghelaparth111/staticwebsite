<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Categories</title>

    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>

    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

    <style>
        body {
            background: #f5f5f5;
        }

        .products {
            padding: 30px 120px;
        }

        /* CATEGORY BUTTONS */

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 35px;
            justify-content: center;
        }

        .category-buttons button {
            padding: 12px 22px;
            border: none;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .category-buttons button:hover,
        .category-buttons .active {
            background: blue;
            color: white;
        }

        /* PRODUCT GRID */

        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
        }

        .product-card a{
            text-decoration: none;
            color: blue;
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-content {
            padding: 20px;
        }

        .product-content h3 {
            margin-bottom: 10px;
            color: #111827;
            text-transform: capitalize;
        }

        .category {
            color: gray;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .price {
            font-size: 20px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .add {
            width: 100%;
            padding: 12px;
            border: none;
            background: rgb(49, 49, 255);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add:hover {
            background: blue;
        }
    </style>
</head>

<body>

    <div id="header"></div>

    <div class="products">

        <!-- CATEGORY BUTTONS -->

        <div class="category-buttons">
            <button class="active" onclick="filterProducts('all', this)">All</button>
            <button onclick="filterProducts('men', this)">Men</button>
            <button onclick="filterProducts('women', this)">Women</button>
            <button onclick="filterProducts('electronics', this)">Electronics</button>
            <button onclick="filterProducts('fashion', this)">Fashion</button>
            <button onclick="filterProducts('beauty', this)">Beauty</button>
            <button onclick="filterProducts('accessories', this)">Accessories</button>
            <button onclick="filterProducts('others', this)">Others</button>
        </div>

        <div class="product-container" id="productContainer"></div>

    </div>

    <div id="footer"></div>

    <script>

        let products = [
            {
                name: "Mens T-Shirt",
                category: "men",
                price: 2500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749058587/vgt63ew54utyj9mwzyin.webp",
                detail:"product1.html"
            },

            {
                name: "Mens Blue T-Shirt",
                category: "men",
                price: 2200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749317394/qspwwat75xd9kdzthjst.jpg",
                detail:"product1.html"
            },
            {
                name: "Wedding Saree",
                category: "women",
                price: 3200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749316771/hpyj5fppm4lhgtylzm04.webp",
                detail:"product1.html"
            },

            {
                name: "Necklace for Women",
                category: "women",
                price: 2500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749377119/ywgwns1rewggs5jaa9es.jpg",
                detail:"product1.html"
            },
            {
                name: "Smart Watch",
                category: "electronics",
                price: 1500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749059975/qjnmnowwefmqllpqxkvj.jpg",
                detail:"product1.html"
            },

            {
                name: "Motorola Edge 36",
                category: "electronics",
                price: 15000,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749032212/opnwj5lylsbz0ohemhxt.webp",
                detail:"product1.html"
            },
            {
                name: "Rose Water",
                category: "beauty",
                price: 1200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749224066/dgk0wvm4djwbgyru0ywk.webp",
                detail:"product1.html"
            },

            {
                name: "Moisture Face Wash",
                category: "beauty",
                price: 2500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749224300/pazetcrtfsxdhot8wemr.webp",
                detail:"product1.html"
            },
            {
                name: "Laptop Bag",
                category: "accessories",
                price: 1200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749226373/gk6dkzcnl84baje33hq3.jpg",
                detail:"product1.html"
            },

            {
                name: "Side Bag for Girls",
                category: "accessories",
                price: 1500,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749228085/x8zzx5ouglznx7dztfrj.webp",
                detail:"product1.html"
            },
            {
                name: "Sneakers Shoes",
                category: "fashion",
                price: 1800,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1748872303/pferymw5bbwfjbr3anr5.jpg",
                detail:"product1.html"
            },

            {
                name: "Diamond Earrings",
                category: "fashion",
                price: 4200,
                image: "https://res.cloudinary.com/dksz8hsb4/image/upload/v1749226241/av2o24zv9vjcqznkhigu.jpg",
                detail:"product1.html"
            },
            {
                name: "Gift Item",
                category: "others",
                price: 1000,
                image: "https://images.unsplash.com/photo-1513475382585-d06e58bcb0e0",
                detail:"product1.html"
            }

        ];

        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let container = document.getElementById("productContainer");
        function displayProducts(productArray) {

            container.innerHTML = "";

            productArray.forEach((product, index) => {

                container.innerHTML += `
                    <div class="product-card">
                        <a href=${product.detail}>
                        <img src="${product.image}" alt="${product.name}">

                        <div class="product-content">

                            <div class="category">${product.category}</div>

                            <h3>${product.name}</h3>

                            <div class="price">₹${product.price}</div>

                            </a>
                            <button class="add" onclick="addToCart(${index})">Add to Cart</button>
                        </div>

                    </div>

                `;
            });
        }


        function filterProducts(category, button) {
            let buttons = document.querySelectorAll(".category-buttons button");
            buttons.forEach(btn => btn.classList.remove("active"));
            button.classList.add("active");
            if (category === "all") {
                displayProducts(products);
            } else {

                let filtered = products.filter(product =>
                    product.category === category
                );

                displayProducts(filtered);
            }
        }
        function addToCart(index) {
            let product = products[index];
            let existing = cart.find(item => item.name === product.name);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }
            localStorage.setItem("cart", JSON.stringify(cart));
            alert(`${product.name} added to cart!`);
        }

        displayProducts(products);

    </script>

</body>

</html>
