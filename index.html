<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopVerse</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
        });
    </script>
</head>

<body>

    <div id="header"></div>

    <main>
        <section class="slider">
            <div class="slide">
                <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1751733938/homeBanner/kujkf9xj1ve2ie9ksqoh.jpg"
                    alt="Slider Image 1">
            </div>
            <div class="slide">
                <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1751731553/homeBanner/h1edsunc1p3zhe7qmuar.jpg"

            <div class="slide">

                    alt="Slider Image 4">
            </div>
        </section>

        <section class="category">
            <h2>Shop by Category</h2>
            <div class="categories">
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749059975/qjnmnowwefmqllpqxkvj.jpg"
                        alt="Category 1">
                    <h3>Electronics</h3>
                </div>
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749058587/vgt63ew54utyj9mwzyin.webp"
                        alt="Category 2">
                    <h3>Fashion</h3>
                </div>
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1748872303/pferymw5bbwfjbr3anr5.jpg"
                        alt="Category 3">
                    <h3>Shoes</h3>
                </div>
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749377119/ywgwns1rewggs5jaa9es.jpg"
                        alt="Category 4">
                    <h3>Accessories</h3>
                </div>
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749226373/gk6dkzcnl84baje33hq3.jpg"
                        alt="Category 5">
                    <h3>Bags</h3>
                </div>
                <div class="category-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749224066/dgk0wvm4djwbgyru0ywk.webp"
                        alt="Category 6">
                    <h3>Beauty</h3>
                </div>
            </div>
        </section>

        <section class="featured">
            <h2>Featured Products</h2>
            <div class="products">
                <div class="product-item">
                    <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749317394/qspwwat75xd9kdzthjst.jpg"
                        alt="Product 1">
                    <h3>Product 1</h3>
                    <div class="rating">
                        <i class="bx bx-star"></i>
                        <i class="bx bx-star"></i>
                        <i class="bx bx-star"></i>
                        <i class="bx bx-star"></i>
                        <i class="bx bx-star"></i>

                    <h3>Product 5</h3>
                    <div class="rating">
