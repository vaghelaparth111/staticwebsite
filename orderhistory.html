<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Order History</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:40px 8%;
        }

        .order-title{
            text-align:center;
            margin-bottom:50px;
        }

        .order-title h1{
            font-size:50px;
            color:#111827;
        }

        .order-title span{
            color:#6c63ff;
        }

        .orders-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:30px;
        }

        .order-card{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .order-card:hover{
            transform:translateY(-8px);
        }

        .order-card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .order-content{
            padding:25px;
        }

        .order-content h2{
            margin-bottom:10px;
            color:#111827;
        }

        .price{
            color:#6c63ff;
            font-size:24px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .order-info{
            margin-bottom:10px;
            color:#6b7280;
        }

        .status{
            display:inline-block;
            margin-top:15px;
            padding:8px 18px;
            background:#10b981;
            color:white;
            border-radius:30px;
            font-size:14px;
        }

        .empty-orders{
            text-align:center;
            font-size:28px;
            color:gray;
            margin-top:100px;
        }

        @media(max-width:768px){

            .order-title h1{
                font-size:40px;
            }

        }

    </style>

</head>

<body>

    <div class="order-title">

        <h1>Order <span>History</span></h1>

    </div>

    <div class="orders-container" id="ordersContainer">

    </div>

    <script>

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        let container = document.getElementById("ordersContainer");

        function displayOrders(){

            if(orders.length === 0){

                container.innerHTML = `

                    <div class="empty-orders">

                        No Orders Found 📦

                    </div>

                `;

                return;

            }

            orders.forEach((item,index)=>{

                container.innerHTML += `

                    <div class="order-card">

                        <img src="${item.image}">

                        <div class="order-content">

                            <h2>${item.name}</h2>

                            <div class="price">

                                ₹${item.price}

                            </div>

                            <div class="order-info">

                                Quantity : ${item.quantity}

                            </div>

                            <div class="order-info">

                                Order ID : #SV${1000 + index}

                            </div>

                            <div class="order-info">

                                Payment : Successful

                            </div>

                            <span class="status">

                                Delivered

                            </span>

                        </div>

                    </div>

                `;

            });

        }

        displayOrders();

    </script>

</body>

</html>
