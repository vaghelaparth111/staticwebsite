<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cart Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            padding:40px 8%;
        }

        .cart-title{
            text-align:center;
            margin-bottom:50px;
        }

        .cart-title h1{
            font-size:50px;
            color:#111827;
        }

        .cart-title span{
            color:#6c63ff;
        }

        .cart-container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:30px;
        }

        .cart-card{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .cart-card:hover{
            transform:translateY(-8px);
        }

        .cart-card img{
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .cart-content{
            padding:25px;
        }

        .cart-content h2{
            margin-bottom:10px;
            color:#111827;
        }

        .price{
            color:#6c63ff;
            font-size:24px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .quantity{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:20px;
        }

        .quantity button{
            width:35px;
            height:35px;
            border:none;
            background:#6c63ff;
            color:white;
            font-size:20px;
            border-radius:5px;
            cursor:pointer;
        }

        .remove-btn{
            width:100%;
            padding:12px;
            border:none;
            background:#ef4444;
            color:white;
            border-radius:10px;
            cursor:pointer;
            margin-bottom:10px;
            transition:0.3s;
        }

        .remove-btn:hover{
            background:#dc2626;
        }

        .checkout-btn{
            width:100%;
            padding:14px;
            border:none;
            background:#10b981;
            color:white;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            transition:0.3s;
        }

        .checkout-btn:hover{
            background:#059669;
        }

        .total-section{
            margin-top:50px;
            text-align:right;
        }

        .total-section h2{
            font-size:35px;
            color:#111827;
            margin-bottom:20px;
        }

        .total-section span{
            color:#6c63ff;
        }

        .payment-btn{
            padding:15px 35px;
            background:#6c63ff;
            color:white;
            text-decoration:none;
            border-radius:10px;
            display:inline-block;
            transition:0.3s;
        }

        .payment-btn:hover{
            background:#5548e8;
        }

        .empty-cart{
            text-align:center;
            font-size:25px;
            color:gray;
            margin-top:100px;
        }

        @media(max-width:768px){

            .cart-title h1{
                font-size:40px;
            }

            .total-section{
                text-align:center;
            }

        }

    </style>

</head>

<body>

    <div class="cart-title">

        <h1>My <span>Cart</span></h1>

    </div>

    <div class="cart-container" id="cartContainer">

    </div>

    <div class="total-section">

        <h2>
            Total : ₹<span id="totalPrice">0</span>
        </h2>

        <a href="payment.html" class="payment-btn">
            Proceed To Payment
        </a>

    </div>

    <script>

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let container = document.getElementById("cartContainer");

        function displayCart(){

            container.innerHTML = "";

            let total = 0;

            if(cart.length === 0){

                container.innerHTML = `

                    <div class="empty-cart">

                        Your Cart Is Empty 🛒

                    </div>

                `;

                document.getElementById("totalPrice").innerText = 0;

                return;

            }

            cart.forEach((item,index)=>{

                total += item.price * item.quantity;

                container.innerHTML += `

                    <div class="cart-card">

                        <img src="${item.image}">

                        <div class="cart-content">

                            <h2>${item.name}</h2>

                            <div class="price">

                                ₹${item.price * item.quantity}

                            </div>

                            <div class="quantity">

                                <button onclick="decreaseQuantity(${index})">
                                    −
                                </button>

                                <span>${item.quantity}</span>

                                <button onclick="increaseQuantity(${index})">
                                    +
                                </button>

                            </div>

                            <button class="remove-btn" onclick="removeItem(${index})">

                                Remove

                            </button>

                        </div>

                    </div>

                `;

            });

            document.getElementById("totalPrice").innerText = total;

        }

        function increaseQuantity(index){

            cart[index].quantity++;

            localStorage.setItem("cart", JSON.stringify(cart));

            displayCart();

        }

        function decreaseQuantity(index){

            if(cart[index].quantity > 1){

                cart[index].quantity--;

            }

            localStorage.setItem("cart", JSON.stringify(cart));

            displayCart();

        }

        function removeItem(index){

            cart.splice(index,1);

            localStorage.setItem("cart", JSON.stringify(cart));

            displayCart();

        }

        displayCart();

    </script>

</body>

</html>
