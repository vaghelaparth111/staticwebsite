<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Details</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://code.jquery.com/jquery-3.3.1.js" integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous"></script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        .product-container{
            max-width:1200px;
            height: 600px;
            margin:5%;
            background:white;
            border-radius:25px;
            overflow:hidden;
            display:flex;
            flex-wrap:wrap;
            gap:40px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        .product-image{
            flex:1;
            min-width:320px;
        }

        .product-image img{
            width:100%;
            height: 481px;
            border-radius:20px;
            object-fit:cover;
        }

        .product-details{
            flex:1;
            min-width:320px;
            display:flex;
            flex-direction:column;
        }

        .product-category{
            color:blue;
            font-size:18px;
            margin-bottom:10px;
            font-weight:bold;
        }

        .product-details h1{
            font-size:45px;
            color:#111827;
            margin-bottom:15px;
        }

        .rating{
            margin-bottom:20px;
            color:#f59e0b;
            font-size:20px;
        }

        .price{
            font-size:38px;
            color:blue;
            font-weight:bold;
            margin-bottom:20px;
        }

        .description{
            color:#6b7280;
            line-height:32px;
            margin-bottom:30px;
            font-size:17px;
        }

        .quantity{
            display:flex;
            align-items:center;
            gap:15px;
            margin-bottom:30px;
        }

        .quantity button{
            width:40px;
            height:40px;
            border:none;
            background:blue;
            color:white;
            font-size:22px;
            border-radius:8px;
            cursor:pointer;
        }

        .quantity span{
            font-size:22px;
            font-weight:bold;
        }

        .buttons{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .cart-btn,
        .buy-btn{
            padding:15px 35px;
            border:none;
            border-radius:10px;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        .cart-btn{
            background:rgb(57, 57, 255);
        }

        .cart-btn:hover{
            background:blue;
        }

        .buy-btn{
            background:#00b33c;
        }

        .buy-btn:hover{
            background:green;
        }

        .features{
            margin-top:25px;
        }

        .features p{
            margin-bottom:10px;
            color:#374151;
        }

    </style>

</head>

<body>
    <div id="header"></div>

    <div class="product-container">
        <div class="product-image">
            <img src="https://res.cloudinary.com/dksz8hsb4/image/upload/v1749058587/vgt63ew54utyj9mwzyin.webp" alt="Product Image">
        </div>
        <div class="product-details">
            <div class="product-category">Fashion</div>
            <h1>Ments T-Shirt</h1>
            <div class="rating">
                <div class="fa fa-star"></div>
                <div class="fa fa-star"></div>
                <div class="fa fa-star"></div>
                <div class="fa fa-star"></div>
                <div class="fa fa-star-o"></div>
            </div>
            <div class="price">₹2500</div>
            <div class="description">Experience premium sound quality with modern wireless headphones designed for music lovers. Enjoy deep bass, noise cancellation, long battery life, and a comfortable design for daily use.</div>
            <div class="quantity">
                <button onclick="decreaseQuantity()">-</button>
                <span id="quantity">1</span>
                <button onclick="increaseQuantity()">+</button>
            </div>
            <div class="buttons">
                <button class="cart-btn" onclick="addToCart()">Add To Cart</button>
                <button class="buy-btn" onclick="buyNow()">Buy Now</button>
            </div>
        </div>
    </div>
    <div id="footer"></div>
    <script>

        let quantity = 1;
        function increaseQuantity(){
            quantity++;
            document.getElementById("quantity").innerText = quantity;

        }

        function decreaseQuantity(){
            if(quantity > 1){
                quantity--;
                document.getElementById("quantity").innerText = quantity;
            }

        }

        function addToCart(){
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let product = {
                name:"",
                price:2500,
                quantity:quantity,
                image:"https://res.cloudinary.com/dksz8hsb4/image/upload/v1749058587/vgt63ew54utyj9mwzyin.webp"
            };

            cart.push(product);
            localStorage.setItem("cart", JSON.stringify(cart));
            alert("Product Added To Cart ");

        }

        function buyNow(){
            addToCart();
            window.location.href = "cart.html";
        }

    </script>

</body>
</html>
