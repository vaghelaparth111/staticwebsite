<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f5f5f5;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .payment-container{
            width:100%;
            max-width:1000px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            display:flex;
            flex-wrap:wrap;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .payment-left{
            flex:1;
            min-width:320px;
            background:linear-gradient(135deg,#6c63ff,#5548e8);
            color:white;
            padding:50px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .payment-left h1{
            font-size:42px;
            margin-bottom:20px;
        }

        .payment-left p{
            line-height:30px;
            font-size:18px;
        }

        .payment-right{
            flex:1;
            min-width:320px;
            padding:50px;
        }

        .payment-right h2{
            font-size:35px;
            margin-bottom:10px;
            color:#111827;
        }

        .payment-right p{
            color:#6b7280;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input,
        .input-box select{
            width:100%;
            padding:15px;
            border:1px solid #d1d5db;
            border-radius:10px;
            outline:none;
            font-size:16px;
            transition:0.3s;
        }

        .input-box input:focus,
        .input-box select:focus{
            border-color:#6c63ff;
        }

        .row{
            display:flex;
            gap:15px;
        }

        .pay-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:10px;
            background:#6c63ff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .pay-btn:hover{
            background:#5548e8;
        }

        .payment-icons{
            display:flex;
            gap:15px;
            margin-bottom:25px;
        }

        .payment-icons div{
            padding:10px 18px;
            background:#f3f4f6;
            border-radius:10px;
            font-size:14px;
            font-weight:bold;
        }

        @media(max-width:768px){

            .payment-left,
            .payment-right{
                padding:35px;
            }

            .payment-left h1{
                font-size:35px;
            }

            .payment-right h2{
                font-size:30px;
            }

            .row{
                flex-direction:column;
            }

        }

    </style>

</head>

<body>

    <div class="payment-container">

        <div class="payment-left">

            <h1>Secure Payment</h1>

            <p>
                Complete your payment safely and securely.
                ShopVerse provides trusted payment methods
                for a smooth shopping experience.
            </p>

        </div>

        <div class="payment-right">

            <h2>Payment Details 💳</h2>

            <p>
                Enter your payment information below
            </p>

            <div class="payment-icons">

                <div>VISA</div>
                <div>MasterCard</div>
                <div>UPI</div>

            </div>

            <form id="paymentForm">

                <div class="input-box">

                    <input 
                        type="text" 
                        placeholder="Card Holder Name"
                        required
                    >

                </div>

                <div class="input-box">

                    <input 
                        type="text" 
                        placeholder="Card Number"
                        maxlength="16"
                        required
                    >

                </div>

                <div class="row">

                    <div class="input-box">

                        <input 
                            type="text" 
                            placeholder="Expiry Date"
                            required
                        >

                    </div>

                    <div class="input-box">

                        <input 
                            type="password" 
                            placeholder="CVV"
                            maxlength="3"
                            required
                        >

                    </div>

                </div>

                <div class="input-box">

                    <select required>

                        <option value="">
                            Select Payment Method
                        </option>

                        <option>
                            Credit Card
                        </option>

                        <option>
                            Debit Card
                        </option>

                        <option>
                            UPI
                        </option>

                    </select>

                </div>

                <button class="pay-btn" type="submit">

                    Pay Now

                </button>

            </form>

        </div>

    </div>

    <script>

        let form = document.getElementById("paymentForm");

        form.addEventListener("submit",function(e){

            e.preventDefault();

            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            let orders = JSON.parse(localStorage.getItem("orders")) || [];

            orders.push(...cart);

            localStorage.setItem("orders", JSON.stringify(orders));

            localStorage.removeItem("cart");

            alert("Payment Successful ✅");

            window.location.href = "orderhistory.html";

        });

    </script>

</body>

</html>
